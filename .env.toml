# epicenv schema for environment variables
# https://github.com/epicserve/epicenv

# Django Core Settings

[variables.DEBUG]
type = "bool"
default = false
initial = "on"
help_text = "Enable Django debug mode"

[variables.SECRET_KEY]
type = "str"
required = true
initial_func = "epicenv.initializers.url_safe_password"
args = [50]
help_text = "Django secret key for cryptographic signing"

[variables.ALLOWED_HOSTS]
type = "list"
default = []
initial = "localhost,127.0.0.1"
help_text = "List of allowed host/domain names"

[variables.INTERNAL_IPS]
type = "list"
default = ["127.0.0.1"]
initial = "127.0.0.1,0.0.0.0"
help_text = "IPs that can see debug toolbar"

# Database Settings

[variables.POSTGRES_USER]
type = "str"
initial = "django_base_site"
help_text = "PostgreSQL username"

[variables.POSTGRES_DB]
type = "str"
initial = "django_base_site"
help_text = "PostgreSQL database name"

[variables.POSTGRES_PASSWORD]
type = "str"
initial_func = "epicenv.initializers.url_safe_password"
args = [24]
help_text = "PostgreSQL password"

[variables.DATABASE_URL]
type = "url"
initial = "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
help_text = "Database connection URL"

[variables.DB_SSL_REQUIRED]
type = "bool"
default = "false"
help_text = "Require SSL for database connections"

# Redis/Cache Settings

[variables.REDIS_URL]
type = "str"
default = "redis://redis:6379/0"
help_text = "Redis connection URL"

[variables.REDIS_PREFIX]
type = "str"
default = ""
help_text = "Prefix for Redis keys"

# Docker Compose Settings

[variables.COMPOSE_BAKE]
type = "str"
initial = "true"
help_text = "Enable Docker Compose bake"

[variables.DOCKER_BUILDKIT]
type = "str"
initial = "1"
help_text = "Enable Docker BuildKit"

[variables.COMPOSE_DOCKER_CLI_BUILD]
type = "str"
initial = "1"
help_text = "Use Docker CLI for builds"

# Development/Debug Settings

[variables.USE_DOCKER]
type = "bool"
default = false
help_text = "Running inside Docker container"

[variables.IS_DEBUG_LOGGING_ON]
type = "bool"
default = false
help_text = "Enable debug-level logging"

[variables.VITE_DEV_MODE]
type = "bool"
default = "true"
help_text = "Enable Vite development mode"

[variables.READ_DOT_ENV_FILE]
type = "bool"
default = true
help_text = "Read .env file on startup"

# WSGI Settings

[variables.WSGI_APPLICATION]
type = "str"
default = "config.wsgi.application"
help_text = "WSGI application path"

# Storage Settings

[variables.DEFAULT_FILE_STORAGE]
type = "str"
default = "django.core.files.storage.FileSystemStorage"
initial = "storages.backends.s3boto3.S3Boto3Storage"
help_text = "Default file storage backend (defaults to S3/MinIO; switch back to FileSystemStorage to bypass S3)."

[variables.STATICFILES_STORAGE]
type = "str"
help_text = "Static files storage backend"

# AWS Settings (optional, for S3 storage and Django SES email backend)

[variables.AWS_ACCESS_KEY_ID]
type = "str"
help_text = "AWS access key ID"

[variables.AWS_SECRET_ACCESS_KEY]
type = "str"
help_text = "AWS secret access key"

[variables.AWS_STORAGE_BUCKET_NAME]
type = "str"
help_text = "S3 bucket name"

[variables.AWS_S3_REGION]
type = "str"
default = "us-east-2"
help_text = "AWS S3 region"

# Media S3 Storage (used by MinIO locally and by real S3 in prod via apps.base.storage.S3MediaStorage)

[variables.MEDIA_S3_ACCESS_KEY]
type = "str"
default = ""
initial = "minioadmin"
help_text = "S3 access key for media storage (MinIO username locally)"

[variables.MEDIA_S3_SECRET_KEY]
type = "str"
default = ""
initial = "minioadmin"
help_text = "S3 secret key for media storage (MinIO password locally)"

[variables.MEDIA_S3_ENDPOINT_URL]
type = "str"
default = ""
initial = "http://minio:9000"
help_text = "Internal S3 endpoint URL (Docker-internal hostname for MinIO)"

[variables.MEDIA_S3_URL_ENDPOINT_URL]
type = "str"
default = ""
initial = "http://localhost:9000"
help_text = "Browser-facing S3 endpoint URL (used in generated URLs)"

[variables.MEDIA_S3_BUCKET_NAME]
type = "str"
default = ""
initial = "media"
help_text = "S3 bucket name for media uploads"

[variables.MINIO_ROOT_USER]
type = "str"
default = "minioadmin"
help_text = "MinIO root username (local dev only)"

[variables.MINIO_ROOT_PASSWORD]
type = "str"
default = "minioadmin"
help_text = "MinIO root password (local dev only)"

# Host UID/GID for Docker bind-mount file ownership (defaults to 1000)

[variables.HOST_UID]
type = "str"
initial = "1000"
help_text = "Host user UID for Docker bind-mount file ownership"

[variables.HOST_GID]
type = "str"
initial = "1000"
help_text = "Host user GID for Docker bind-mount file ownership"

# Site / proxy

[variables.SITE_DOMAIN]
type = "str"
default = "localhost:8000"
help_text = "Public site domain (host:port). Use 'localhost' rather than '127.0.0.1' so WebAuthn / passkeys work in local dev (the spec rejects bare IPs as RP IDs)."

[variables.SITE_SCHEME]
type = "str"
default = "http"
help_text = "Site scheme (http or https)"

[variables.CSRF_TRUSTED_ORIGINS]
type = "list"
default = []
help_text = "Comma-separated CSRF trusted origins (full scheme://host)"

[variables.SECURE_PROXY_SSL_HEADER]
type = "bool"
default = false
help_text = "Trust X-Forwarded-Proto from the reverse proxy. Only enable when the app is behind a proxy that strips this header from client requests."

# Allauth

[variables.ACCOUNT_SIGNUP_OPEN]
type = "bool"
default = false
help_text = "Allow new account signups"

# Email Settings

[variables.DEFAULT_FROM_EMAIL]
type = "str"
default = ""
help_text = "Default email address for sending emails, required when using Django SES for sending emails on the production instance."

[variables.EMAIL_URL]
type = "str"
default = "smtp://mailpit:1025"
help_text = "Email server connection URL (Mailpit for local development)"

# Instance Settings

[variables.INSTANCE]
type = "str"
default = "dev"
help_text = "Instance name (e.g., dev, staging, prod)"

# Notifications

[variables.NOTIFICATIONS_RETENTION_DAYS]
type = "int"
default = 90
help_text = "Default age (days) at which notifications without an explicit expires_at are purged."

# Billing / Stripe

[variables.BILLING_ENABLED]
type = "bool"
default = false
help_text = "Enable Stripe billing. When false the API + webhook are unmounted and feature gates pass."

[variables.BILLING_USE_EXAMPLE_PLANS]
type = "bool"
default = false
help_text = "Load the bundled Free/Pro/Business example plans from apps.billing.example_plans. Useful for dogfooding the billing UX without editing settings. Requires the four STRIPE_PRICE_* env vars when BILLING_ENABLED=true."

[variables.STRIPE_SECRET_KEY]
type = "str"
default = ""
help_text = "Stripe secret key (sk_test_... or sk_live_...). Required when BILLING_ENABLED=true."

[variables.STRIPE_PUBLISHABLE_KEY]
type = "str"
default = ""
help_text = "Stripe publishable key (pk_test_... or pk_live_...). Sent to the SPA via app-context."

[variables.STRIPE_WEBHOOK_SECRET]
type = "str"
default = ""
help_text = "Stripe webhook signing secret (whsec_...). Required when BILLING_ENABLED=true. Use `stripe listen --forward-to ...` for local dev."

[variables.STRIPE_PRICE_PRO_MONTHLY]
type = "str"
default = ""
help_text = "Stripe price ID (price_...) for the Pro plan, billed monthly."

[variables.STRIPE_PRICE_PRO_ANNUAL]
type = "str"
default = ""
help_text = "Stripe price ID (price_...) for the Pro plan, billed annually."

[variables.STRIPE_PRICE_BUSINESS_MONTHLY]
type = "str"
default = ""
help_text = "Stripe price ID (price_...) for the Business plan, billed monthly."

[variables.STRIPE_PRICE_BUSINESS_ANNUAL]
type = "str"
default = ""
help_text = "Stripe price ID (price_...) for the Business plan, billed annually."

# Django Superuser (optional — enables idempotent superuser creation on `just start`)
# Leave blank to skip. To source from a secrets manager instead, override the
# `create_superuser` recipe in your project's justfile.

[variables.DJANGO_SUPERUSER_USERNAME]
type = "str"
default = ""
help_text = "Username for the Django superuser auto-created on startup. Leave blank to skip."

[variables.DJANGO_SUPERUSER_EMAIL]
type = "str"
default = ""
help_text = "Email for the Django superuser auto-created on startup."

[variables.DJANGO_SUPERUSER_PASSWORD]
type = "str"
default = ""
help_text = "Password for the Django superuser auto-created on startup. For production prefer the secrets-manager pipeline — see README.md."
