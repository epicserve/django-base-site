# zensical.toml
# Native Zensical configuration for Django Base Site docs.
# This replaces the previous mkdocs.yml (kept temporarily for reference during transition).

[project]
site_name = "Django Base Site"
repo_url = "https://github.com/epicserve/django-base-site"
repo_name = "epicserve/django-base-site"
docs_dir = "docs"
site_dir = "docs_site"

# Development server address (chosen to avoid conflict with Django's runserver on 8000)
dev_addr = "localhost:4000"

# Optional but recommended for production docs
# site_url = "https://django-base-site.readthedocs.io/"

copyright = "Copyright &copy; 2026 epicserve"

# ----------------------------------------------------------------------------
# Theme configuration
# ----------------------------------------------------------------------------
[project.theme]

# Using the modern Zensical theme (the new default design).
# Previously pinned to "classic" to match the old Material for MkDocs look during migration.

# Features for a polished documentation experience
features = [
  # Code
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",

  # Navigation & UX
  "navigation.footer",
  "navigation.indexes",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "toc.follow",

  # Search
  "search.highlight",
  "search.suggest",
]

# ----------------------------------------------------------------------------
# Color palette
# Navy + Orange for a distinctive but modern look.
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "default"
primary = "navy"
accent = "orange"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "navy"
accent = "orange"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Markdown extensions (matching previous setup + snippets for changelog)
# ----------------------------------------------------------------------------
[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.snippets]
base_path = "."
check_paths = true
