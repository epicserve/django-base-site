# Reference docs: https://docs.docker.com/compose/compose-file/compose-file-v3/

services:

  db:
    container_name: db
    image: postgres:17
    init: true
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    container_name: redis
    image: redis:7.0
    init: true
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  mailpit:
    container_name: mailpit
    image: axllent/mailpit
    init: true
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio:
    container_name: minio
    image: minio/minio:latest
    init: true
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    container_name: web
    image: epicserve/django-base-site:python
    init: true
    build:
      context: .
      dockerfile: config/docker/Dockerfile.web
      target: dev

    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

    command: >
      sh -c "
        ./manage.py migrate --noinput &&
        ./manage.py ensure_s3_bucket &&
        if [ \"$$USE_DEBUGPY\" = \"true\" ]; then
          echo '=========================================' &&
          echo 'Starting Django with debugger enabled' &&
          echo 'Debugger listening on 0.0.0.0:5678' &&
          echo 'Attach from VS Code, LazyVim, or any DAP client' &&
          echo '=========================================' &&
          python -m debugpy --listen 0.0.0.0:5678 ./manage.py runserver 0.0.0.0:8000 --nothreading --noreload
        else
          ./manage.py runserver 0.0.0.0:8000
        fi
      "

    volumes:
      - .:/srv/app:cached

    ports:
      - "8000:8000"
      - "5678:5678"  # debugpy port for VS Code/LazyVim debugging

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      minio:
        condition: service_healthy

    environment:
      USE_DOCKER: 'on'
      DJANGO_SETTINGS_MODULE: config.settings
      # Pass through USE_DEBUGPY from shell or .env file (defaults to empty/false)
      USE_DEBUGPY: ${USE_DEBUGPY:-}

  worker:
    container_name: worker
    image: epicserve/django-base-site:python
    init: true

    command: sh -c "celery -A config worker -l info"

    volumes:
      - .:/srv/app:cached

    depends_on:
      web:
        condition: service_started
      mailpit:
        condition: service_healthy

    environment:
      DJANGO_SETTINGS_MODULE: config.settings

  frontend:
    container_name: frontend
    image: epicserve/django-base-site:bun
    build:
      context: .
      dockerfile: config/docker/Dockerfile.bun
    init: true
    working_dir: /srv/app

    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

    command: sh -c "bun run dev --host 0.0.0.0"

    volumes:
      - .:/srv/app
      - node_modules:/srv/app/node_modules

    ports:
      - "3000:3000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  docs:
    container_name: docs
    image: epicserve/django-base-site:python
    init: true

    command: sh -c "mkdocs serve -f config/mkdocs.yml --dev-addr 0.0.0.0:4000"

    volumes:
      - .:/srv/app:cached

    ports:
      - "4000:4000"

    environment:
      LIVE_RELOAD_SUPPORT: 'true'
      FAST_MODE: 'true'

    profiles:
      - full
      - docs

    depends_on:
      web:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  node_modules:
