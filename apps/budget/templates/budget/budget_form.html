{% extends "layouts/base.html" %}
{% load crispy_forms_tags %}

{% block title %}{% if object %}Edit {{ object.name }}{% else %}New Budget{% endif %}{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h1 class="h3 mb-4">{% if object %}Edit Budget{% else %}New Budget{% endif %}</h1>
      {% crispy form %}
      <a href="{% url 'budget:list' %}" class="btn btn-link mt-2">Cancel</a>
    </div>
  </div>
{% endblock %}
