{% extends "layouts/base.html" %}

{% block title %}Budget History{% endblock %}

{% block content %}
  <h1 class="mb-4">Budget History</h1>
  {% if months %}
    <ul class="list-group">
      {% for row in months %}
        <li class="list-group-item">
          <a href="{% url 'budget:detail' budget_pk=budget.pk %}?month={{ row.month|date:'Y-m' }}">
            {{ row.month|date:"F Y" }}
          </a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="text-muted">No budget history yet.</p>
  {% endif %}
{% endblock %}
