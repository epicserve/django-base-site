name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Just for running commands
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install frontend requirements
        run: bun install --frozen-lockfile
      - name: Install Python requirements
        run: |
          pip install --upgrade uv
          uv sync --frozen
      - name: Run linting
        run: |
          PATH=$(pwd)/.venv/bin/:${PATH} just lint
        env:
          SECRET_KEY: secret-key-for-testing-only
          DEBUG: on
          PYTHON_CMD_PREFIX_WITH_DEPS: ""
          PYTHON_CMD_PREFIX: ""
          BUN_CMD_PREFIX: ""
  test:
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    runs-on: ubuntu-latest
    name: Tests install script
    env:
      BUILD_DIR: /home/runner/work/django-base-site/new_project/
      SECRET_KEY: secret-key-for-testing-only
      READ_DOT_ENV_FILE: on
      PYTHON_CMD_PREFIX: docker compose run -u root --rm --no-deps web
      DOCKER_COMPOSE_PREFIX: docker compose run -u root -e DATABASE_URL -e READ_DOT_ENV_FILE -e SECRET_KEY -e DB_SSL_REQUIRED --rm --no-deps web
    steps:
      - uses: actions/checkout@v6
      - name: Use Just for running commands
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin
      - name: Match docker user to runner UID/GID
        # The bun container bind-mounts the workspace and writes to it, so it
        # needs the same UID/GID as the runner user that owns the files.
        run: |
          echo "HOST_UID=$(id -u)" >> $GITHUB_ENV
          echo "HOST_GID=$(id -g)" >> $GITHUB_ENV
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Test install script
        run: |
          ./scripts/start_new_project "example" ${GITHUB_REF#refs/heads/} 1 ${{ env.BUILD_DIR }}
      - name: Verify project files were updated correctly
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          echo "Verifying compose.yml was updated..."
          grep -q "image: example" compose.yml || (echo "ERROR: compose.yml not updated correctly" && exit 1)
          ! grep -q "image: epicserve/django-base-site" compose.yml || (echo "ERROR: compose.yml still contains template text" && exit 1)

          echo "Verifying justfile was updated..."
          grep -q "example" justfile || (echo "ERROR: justfile not updated correctly" && exit 1)

          echo "Verifying Dockerfile.web was updated..."
          grep -q "example" config/docker/Dockerfile.web || (echo "ERROR: Dockerfile.web not updated correctly" && exit 1)

          echo "All verification checks passed!"
      - name: Build docker images
        working-directory: ${{ env.BUILD_DIR }}
        run: docker compose build web frontend
      - name: Build assets
        working-directory: ${{ env.BUILD_DIR }}
        run: just build_frontend
      - name: Run tests
        working-directory: ${{ env.BUILD_DIR }}
        run: ${{ env.DOCKER_COMPOSE_PREFIX }} pytest --cov --ds=config.settings.test_runner
        env:
          DATABASE_URL: postgres://postgres:postgres@172.17.0.1:5432/postgres
          READ_DOT_ENV_FILE: False
          DB_SSL_REQUIRED: False
  e2e:
    name: E2E tests
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: secret-key-for-testing-only
      READ_DOT_ENV_FILE: False
      DB_SSL_REQUIRED: False
      DATABASE_URL: postgres://postgres:postgres@172.17.0.1:5432/postgres
      # Override the default `docker compose exec web` so just recipes work
      # against an ephemeral container instead of expecting a running service,
      # and forward the env vars Django needs to bootstrap settings.
      PYTHON_CMD_PREFIX: docker compose run -u root -e DATABASE_URL -e READ_DOT_ENV_FILE -e SECRET_KEY -e DB_SSL_REQUIRED --rm --no-deps web
      DOCKER_COMPOSE_PREFIX: docker compose run -u root -e DATABASE_URL -e READ_DOT_ENV_FILE -e SECRET_KEY -e DB_SSL_REQUIRED --rm --no-deps web
    steps:
      - uses: actions/checkout@v6
      - name: Use Just for running commands
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin
      - name: Match docker user to runner UID/GID
        # The bun container bind-mounts the workspace and writes to it, so it
        # needs the same UID/GID as the runner user that owns the files.
        run: |
          echo "HOST_UID=$(id -u)" >> $GITHUB_ENV
          echo "HOST_GID=$(id -g)" >> $GITHUB_ENV
      - name: Create empty .env (docker compose env_file requires the file to exist)
        run: touch .env
      - name: Build dev docker image (includes Playwright browsers)
        run: docker compose build web frontend
      - name: Build frontend assets
        run: just build_frontend
      - name: Run Playwright e2e tests
        run: ${{ env.DOCKER_COMPOSE_PREFIX }} pytest e2e/ --ds=config.settings.e2e
